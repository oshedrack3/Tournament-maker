<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>eFootball League</title>
  <link rel="stylesheet" href="styles.css" />
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>


<div id="app">
  
  <!-- HEADER -->
      <h1 class="appHeader"> EfootBall Tournaments</h1>
<section id="listOfTournamentPage">
      <div class="create-tournament" style="display: flex; gap: 10px; flex-direction: column; max-width: 300px;">
        <h2> Create New Tournament
        </h2>
        <input type="text" id="tournamentNameInput" placeholder="Tournament name" />
        
        <select id="tournamentFormatInput">
          <option value="league">Round Robin (League)</option>
          <option value="knockout">Knockout (Bracket)</option>
        </select>
        
        <button onclick="tournamentCreator()">Create</button>
      </div>
      
      <div id="tournamentList"></div>
    </section>
    
    
    
    
    
    
    <!-- TOURNAMENT PAGE -->
    
    <section id="tournamentPage" class="page" style="display:none">
      
      <!-- NAV -->
      <nav class="bottom-nav">
        <button onclick="goToTablePage()">League</button>
        <button onclick="goToFixturePage()">Fixtures</button>
        <button onclick="goToStatPage()">Stats</button>
      </nav>
      
      <button id="btn-backHome" onclick="goToListOfTournamentPage()">
        ← Home
      </button>
      
      <h2 id="tournamentTitle">Tournament Name</h2>
      
      <!-- TABLE PAGE -->
      
      <section class="page" id="tablePage" style="display:none;">
        <h2 id="tableTitle">League Table</h2>
        
        <div class="btn-tablePage">
          <button onclick="toggleScreenshotMode()" style="margin-bottom: 10px; padding: 8px 12px; background: #2a2a2a; border: none; border-radius: 6px; color: #fff;">
            FullView
          </button>
          <button onclick="goToShortViewPage()">ShortView</button>
          <button onclick="shareTable()" style="padding: 8px 12px; background: #238636; border: none; border-radius: 6px; color: #fff;"> 📷
            
          </button>
          
          <button onclick="goToFormViewPage()">Form</button>
          <button onclick="goToTeamListPage()"> Teams</button>
          
        </div>
        <div class="table-wrapper">
          <table id="leagueTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Team</th>
                <th>P</th>
                <th>W</th>
                <th>D</th>
                <th>L</th>
                <th>GF</th>
                <th>GA</th>
                <th>GD</th>
                <th>Pts</th>
              </tr>
            </thead>
            
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        
        
      </section>
      
      
      <!-- FIXTURES -->
      
      
      <section class="page" id="fixturePage" style="display:none;">
        
        <div class="fixture-header">
          <button class="btn-fixture" onclick="handleGenerateFixtures()">Generate Fixtures</button>
          <button id="btn-previous" onclick="prevRound()">⬅ Prev</button>
          <button id="btn-next" onclick="nextRound()">Next ➡</button>
          <button id="btn-shareFixtures" onclick="shareFixtures()">📷</button>
        </div>
        
        <div id="fixtureScreenshotArea" style="background: #0d1117; padding: 10px; border-radius: 8px;">
          <h2 id="roundLabel">Fixtures</h2>
          <div id="fixtureList"></div>
        </div>
        
        <div class="score-box">
          <h3>Record Match Result</h3>
          <select id="homeTeam"></select>
          <select id="awayTeam"></select>
          <input id="homeGoals" type="number" placeholder="Home Goals" />
          <input id="awayGoals" type="number" placeholder="Away Goals" />
          <button onclick="handleSetScore()">Save Score</button>
          <button onclick="handleResetMatch()">Reset Score</button>
        </div>
        
      </section>
      
      <!-- STATS -->
      <section class="page" id="statPage" style="display:none;">
        <h2>Statistics</h2>
      </section>
      
    </section>
</div>


</main>







<div id="teamListPage" style="display:none">
  <button id="btn-backTeamPage" onclick="goToTablePage()"> Table </button>
  <h1> Registered Team </h1>
  <div id="teamList"></div>
  
  <div class="add-team-box">
    <h3>Add Team</h3>
    
    <input id="teamNameInput" type="text" placeholder="Enter team name" />
    
    <button onclick="handleAddTeam()">Add Team</button>
  </div>
  
</div>



<!-- SHORT VIEW -->

<section class="page" id="shortViewPage" style="display:none;">
  <h2>Short View</h2>
  <button id="btn-backFormPage" onclick="goToTablePage()"> Table </button>
  
  <div id="shortTableContainer">
    <table class="short-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Team</th>
          <th>P</th>
          <th>GD</th>
          <th>PT</th>
        </tr>
      </thead>
      <tbody id="shortTableBody">
        
      </tbody>
    </table>
  </div>
  
</section>


<!-- FORM -->

<section class="page" id="formViewPage" style="display:none;">
  <h2>Form View</h2>
  <button class="btn-back" onclick="goToTablePage()"> Table </button>
  
  <div id="formContainer"></div>
</section>



<div id="alertModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <p id="alertText"></p>
    <button onclick="closeAlert()">OK</button>
  </div>
</div>



<div id="inputModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <p id="inputTitle">Enter option</p>
    
    <input id="modalInput" type="number" placeholder="1 or 2" />
    
    <div style="margin-top:15px;">
      <button onclick="submitModalInput()">OK</button>
      <button onclick="closeInputModal()">Cancel</button>
    </div>
  </div>
</div>


<div id="confirmModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <p id="confirmText">Are you sure?</p>
    
    <div style="margin-top:15px;">
      <button onclick="confirmYes()">Yes</button>
      <button onclick="confirmNo()">No</button>
    </div>
  </div>
</div>




 <script src="league.js"></script>
 <script src="helper.js"></script> 


</body>

</html>
