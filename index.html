<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>eFootball League</title>
  <link rel="stylesheet" href="styles.css" />
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>


<div id="app">
  
<section id="listOfTournamentPage" class="page">
  
    <!-- HEADER -->
  <div class="header">
    <h1 class="appHeader"> Tournamrnt Maker</h1>
    <p> Every Tournament You want, We make it!!</p>
    
  </div>
  
  
 <button class="createNewTour" onclick="openCreateTournament()">Create  Tournament</button> 
<div id="createTour" class="modal-overlay" style="display:none">
  <div class="tourCreatorSection">
    <div class="create-tournament">
      <h2>Create New Tournament</h2>
      
      <input type="text" id="tournamentNameInput" placeholder="Tournament name" />
      
      <select id="tournamentFormatInput">
        <option value="league">Round Robin (League)</option>
        <option value="knockout">Knockout</option>
      </select>
      
      <button onclick="tournamentCreator()">Create</button>
      <button onclick="hideCreateTournament()">Close</button>
    </div>
  </div>
</div>      <div class="tourListWrap">
      <div id="tournamentList"></div>
      </div>
    </section>
    
    
    
    
    
    
    <!-- TOURNAMENT PAGE -->
    
    <section id="tournamentPage" class="page" style="display:none">
      
      <!-- NAV -->
      <nav class="bottom-nav">
        <button onclick="goToTablePage()">League</button>
        <button onclick="goToFixturePage()">Fixtures</button>
      </nav>
      
  
       <!-- TABLE PAGE -->
      
      <section class="page" id="tablePage" style="display:none;">
         <button class="btn-back" onclick="goToListOfTournamentPage()">
   🔙
 </button>
      
        <div class="topSection">
         
        <h2 id="tournamentTitle">Tournament Name</h2>
        </div>
        
        <div class="btn-tablePage">
          <button onclick="toggleScreenshotMode()">
            FullView
          </button>
            <button onclick="shareTable()"> 📷
    
  </button>
   
          
       
          <button onclick="goToTeamListPage()"> Add Teams</button>
         
      </div>     
        
        
        <div class="table-wrapper">
          <table id="leagueTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Team</th>
                <th>P</th>
                <th>W</th>
                <th>D</th>
                <th>L</th>
                <th>GF</th>
                <th>GA</th>
                <th>GD</th>
                <th>Pts</th>
              </tr>
            </thead>
            
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        
        
      </section>
      
      
      <!-- FIXTURES -->
      
      
      <section class="page" id="fixturePage" style="display:none;">
        
     
        <div class="topSection">
         <h2> Fixtures and Match Results </h2>
        </div>
      
          <div class="btn-tablePage">
          <button  onclick="handleGenerateFixtures()">Create </button>
          <button onclick="prevRound()">⬅ Prev</button>
          <button onclick="nextRound()">Next ➡</button>
          <button  onclick="shareFixtures()">📷</button>
        </div>
      
       
     
      
      <div class="content">
        <div id="fixtureScreenshotArea" style="background: #0d1117; padding: 10px; border-radius: 8px;">
          
   
        <h2 id="roundLabel">Fixtures
        </h2>
    
          
          <div id="fixtureList"></div>
        </div>
        <div class="score-box">
  <h3>Record Match Result</h3>
  
  <div class="row">
    <select id="homeTeam"></select>
    <input id="homeGoals" type="number" placeholder="Goals" />
  </div>
  
  <div class="row">
    <select id="awayTeam"></select>
    <input id="awayGoals" type="number" placeholder="Goals" />
  </div>
  
  <div class="row btn-row">
    <button class="btn-save" onclick="handleSetScore()">Save Score</button>
    <button class="btn-delete" onclick="handleResetMatch()">Reset Score</button>
  </div>
</div>
          </div>
        
      </section>
      
      <!-- STATS -->
      <section class="page" id="statPage" style="display:none;">
        <h2>Statistics</h2>
      </section>
      
    </section>
</div>


</main>







<div class="page" id="teamListPage" style="display:none">
  <button class="btn-back" onclick="goToTablePage()"> 🔙 </button>
  <div class="topSection">
  <h1> Register Team </h1>
  </div>
  
  <div id="teamList"></div>
  
  <div class="add-team-box">
    
    <input id="teamNameInput" type="text" placeholder="Enter team name" />
    
    <button onclick="handleAddTeam()"> Register Team</button>
  </div>
  
</div>



<!-- FORM -->

<section class="page" id="formViewPage" style="display:none;">
  <h2>Form View</h2>
  <button class="btn-back" onclick="goToTablePage()"> Table </button>
  
  <div id="formContainer"></div>
</section>



<div id="alertModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <p id="alertText"></p>
    <button onclick="closeAlert()">OK</button>
  </div>
</div>



<div id="inputModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <p id="inputTitle">Enter option</p>
    
    <input id="modalInput" type="number" placeholder="1 or 2" />
    
    <div style="margin-top:15px;">
      <button onclick="submitModalInput()">OK</button>
      <button onclick="closeInputModal()">Cancel</button>
    </div>
  </div>
</div>


<div id="confirmModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <p id="confirmText">Are you sure?</p>
    
    <div style="margin-top:15px;">
      <button onclick="confirmYes()">Yes</button>
      <button onclick="confirmNo()">No</button>
    </div>
  </div>
</div>


<div id="actionModal" class="action-modal"></div>



 <script src="league.js"></script>
 <script src="helper.js"></script> 


</body>

</html>
